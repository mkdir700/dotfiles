deduplicateAppIcons = false
enabled = true
height = 24.0
hideEmptyWorkspaces = false
labelFontSize = 12.0
notchAware = true
position = "overlappingMenuBar"
reserveLayoutSpace = false
showFloatingWindows = false
showLabels = true
windowLevel = "popup"
xOffset = 0.0
yOffset = 0.0

[workspaceBar.accentColor]
